stages:
  - deploy

deploy:
  stage: deploy
  tags:
    - docker-deploy
  resource_group: production
  variables:
    COMPOSE_PROJECT_NAME: knowledge-hub
    POSTGRES_HOST_PORT: "5432"
    POSTGRES_DSN: "postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/knowledge_hub"
    DOCKER_LOCAL_LLM_BASE_URL: "http://192.168.15.114:1234"
    EMBEDDING_VERSION: "default"
    MCP_PUBLIC_URL: "http://192.168.15.125:8001"
  script:
    - docker compose config --quiet
    - |
      cleanup_containers() {
        echo "Stopping/removing old backend/frontend/MCP containers."
        docker compose stop backend frontend mcp || true
        docker compose rm -sf backend frontend mcp || true

        for name in knowledge-hub-backend knowledge-hub-frontend knowledge-hub-mcp mcp-knowledge-hub-backend mcp-knowledge-hub-frontend mcp-knowledge-hub-mcp; do
          if docker container inspect "${name}" >/dev/null 2>&1; then
            remove_container_by_name "${name}" || return 1
          fi
        done
        sleep 2
      }

      remove_container_by_name() {
        name="$1"
        echo "Removing container ${name}."
        if docker rm -f "${name}"; then
          return 0
        fi

        echo "Docker daemon could not kill ${name}; asking PID 1 inside the container to exit."
        docker update --restart=no "${name}" || true
        docker exec -u 0 "${name}" sh -c 'kill -TERM 1' || true
        for _ in $(seq 1 10); do
          running="$(docker inspect "${name}" --format '{{.State.Running}}' 2>/dev/null || true)"
          if [ "${running}" != "true" ]; then
            break
          fi
          sleep 1
        done
        running="$(docker inspect "${name}" --format '{{.State.Running}}' 2>/dev/null || true)"
        if [ "${running}" = "true" ]; then
          echo "${name} ignored TERM; sending SIGKILL from inside the container."
          docker exec -u 0 "${name}" sh -c 'kill -KILL 1' || true
          for _ in $(seq 1 10); do
            running="$(docker inspect "${name}" --format '{{.State.Running}}' 2>/dev/null || true)"
            if [ "${running}" != "true" ]; then
              break
            fi
            sleep 1
          done
        fi

        if docker rm -f "${name}"; then
          return 0
        fi

        echo "Could not remove ${name}; the Docker runner may need daemon-level cleanup."
        echo "Container state follows."
        docker inspect "${name}" --format '{{json .State}}' || true
        return 1
      }

      has_service_containers() {
        for name in knowledge-hub-backend knowledge-hub-frontend knowledge-hub-mcp mcp-knowledge-hub-backend mcp-knowledge-hub-frontend mcp-knowledge-hub-mcp; do
          if docker container inspect "${name}" >/dev/null 2>&1; then
            return 0
          fi
        done
        return 1
      }

      show_service_containers() {
        docker ps -a \
          --filter name=knowledge-hub-backend \
          --filter name=knowledge-hub-frontend \
          --filter name=knowledge-hub-mcp \
          --filter name=mcp-knowledge-hub-backend \
          --filter name=mcp-knowledge-hub-frontend \
          --filter name=mcp-knowledge-hub-mcp || true
      }

      diagnose_backend() {
        echo "Backend container diagnostics:"
        docker ps -a --filter name=knowledge-hub-backend || true
        docker inspect knowledge-hub-backend \
          --format '{{json .State.Health}}' || true
        docker inspect knowledge-hub-backend \
          --format '{{range .Config.Env}}{{println .}}{{end}}' | grep POSTGRES_DSN || true
        docker logs --tail=160 knowledge-hub-backend || true
      }

      wait_for_backend_health() {
        healthy_checks=0
        for _ in $(seq 1 30); do
          status="$(docker inspect knowledge-hub-backend --format '{{.State.Health.Status}}' 2>/dev/null || true)"
          if [ "${status}" = "healthy" ]; then
            healthy_checks=$((healthy_checks + 1))
            if [ "${healthy_checks}" -ge 3 ]; then
              return 0
            fi
          else
            healthy_checks=0
          fi
          if [ "${status}" = "unhealthy" ]; then
            diagnose_backend
            return 1
          fi
          sleep 2
        done

        diagnose_backend
        return 1
      }

      wait_for_frontend_health() {
        healthy_checks=0
        for _ in $(seq 1 30); do
          status="$(docker inspect knowledge-hub-frontend --format '{{.State.Health.Status}}' 2>/dev/null || true)"
          if [ "${status}" = "healthy" ]; then
            healthy_checks=$((healthy_checks + 1))
            if [ "${healthy_checks}" -ge 3 ]; then
              return 0
            fi
          else
            healthy_checks=0
          fi
          if [ "${status}" = "unhealthy" ]; then
            docker logs --tail=160 knowledge-hub-frontend || true
            return 1
          fi
          sleep 2
        done

        docker ps -a --filter name=knowledge-hub-frontend || true
        docker logs --tail=160 knowledge-hub-frontend || true
        return 1
      }

      diagnose_postgres() {
        echo "Postgres container diagnostics:"
        docker compose ps postgres || true
        docker inspect knowledge-hub-postgres \
          --format '{{json .State.Health}}' || true
        docker logs --tail=160 knowledge-hub-postgres || true
      }

      wait_for_postgres_health() {
        docker compose up -d --force-recreate postgres
        healthy_checks=0
        for _ in $(seq 1 30); do
          status="$(docker inspect knowledge-hub-postgres --format '{{.State.Health.Status}}' 2>/dev/null || true)"
          if [ "${status}" = "healthy" ]; then
            healthy_checks=$((healthy_checks + 1))
            if [ "${healthy_checks}" -ge 3 ]; then
              return 0
            fi
          else
            healthy_checks=0
          fi
          if [ "${status}" = "unhealthy" ]; then
            diagnose_postgres
            return 1
          fi
          sleep 2
        done

        diagnose_postgres
        return 1
      }

      deploy_containers() {
        wait_for_postgres_health
        docker compose up -d --build --no-deps --force-recreate backend
        wait_for_backend_health
        docker compose up -d --build --no-deps --force-recreate frontend
        wait_for_frontend_health
        docker compose up -d --build --no-deps --force-recreate mcp
      }

      remove_recreate_containers() {
        if docker ps -aq \
          --filter name='^[0-9a-f]+_knowledge-hub-backend$' \
          --filter name='^[0-9a-f]+_knowledge-hub-frontend$' \
          --filter name='^[0-9a-f]+_knowledge-hub-mcp$' | grep -q .; then
          echo "Removing stale Compose recreate containers."
          docker ps -aq \
            --filter name='^[0-9a-f]+_knowledge-hub-backend$' \
            --filter name='^[0-9a-f]+_knowledge-hub-frontend$' \
            --filter name='^[0-9a-f]+_knowledge-hub-mcp$' | xargs -r docker rm -f
        fi
      }

      release_service_ports() {
        for port in 8000 8001 8080; do
          if ss -H -ltn "sport = :${port}" | grep -q .; then
            echo "Port ${port} is busy before deploy; releasing stale listener."
            ss -H -ltnp "sport = :${port}" || true
            cleanup_containers || true
            fuser -k "${port}/tcp" || true
            sleep 2
          fi

          if ss -H -ltn "sport = :${port}" | grep -q .; then
            echo "Port ${port} is still busy after release attempt."
            ss -H -ltnp "sport = :${port}" || true
            show_service_containers
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' || true
            exit 1
          fi
        done
      }

      remove_recreate_containers
      cleanup_containers
      release_service_ports

      if has_service_containers; then
        echo "Old backend/MCP containers are still stuck after cleanup."
        show_service_containers
        exit 1
      fi

      if ! deploy_containers; then
        echo "Docker failed while recreating containers; retrying backend/MCP cleanup once."
        remove_recreate_containers
        cleanup_containers
        release_service_ports

        if has_service_containers; then
          echo "Old containers are still stuck after retry cleanup."
          show_service_containers
          exit 1
        fi

        deploy_containers
      fi
    - docker compose ps
    - |
      if ! docker compose exec -T backend python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"; then
        echo "Final backend healthcheck failed."
        docker compose ps || true
        docker inspect knowledge-hub-backend \
          --format '{{json .State}}' || true
        docker inspect knowledge-hub-backend \
          --format '{{range .Config.Env}}{{println .}}{{end}}' | grep POSTGRES_DSN || true
        docker logs --tail=200 knowledge-hub-backend || true
        exit 1
      fi
    - |
      if ! docker compose exec -T frontend wget -q -O /dev/null http://127.0.0.1/health; then
        echo "Final frontend healthcheck failed."
        docker compose ps || true
        docker inspect knowledge-hub-frontend --format '{{json .State}}' || true
        docker logs --tail=200 knowledge-hub-frontend || true
        exit 1
      fi
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
