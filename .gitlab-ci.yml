stages:
  - deploy

deploy:
  stage: deploy
  tags:
    - docker-deploy
  resource_group: production
  variables:
    COMPOSE_PROJECT_NAME: mcp-knowledge-hub
    POSTGRES_DSN: "postgresql+asyncpg://postgres:postgres@host.docker.internal:15432/knowledge_hub"
    DOCKER_LOCAL_LLM_BASE_URL: "http://192.168.15.114:1234"
    MCP_PUBLIC_URL: "http://192.168.15.125:8001"
  script:
    - docker compose config --quiet
    - |
      cleanup_containers() {
        docker rm -f mcp-knowledge-hub-backend mcp-knowledge-hub-mcp 2>/dev/null || true
      }

      diagnose_backend() {
        echo "Backend container diagnostics:"
        docker ps -a --filter name=mcp-knowledge-hub-backend || true
        docker inspect mcp-knowledge-hub-backend \
          --format '{{json .State.Health}}' || true
        docker inspect mcp-knowledge-hub-backend \
          --format '{{range .Config.Env}}{{println .}}{{end}}' | grep POSTGRES_DSN || true
        docker logs --tail=160 mcp-knowledge-hub-backend || true
      }

      wait_for_backend_health() {
        healthy_checks=0
        for _ in $(seq 1 30); do
          status="$(docker inspect mcp-knowledge-hub-backend --format '{{.State.Health.Status}}' 2>/dev/null || true)"
          if [ "${status}" = "healthy" ]; then
            healthy_checks=$((healthy_checks + 1))
            if [ "${healthy_checks}" -ge 3 ]; then
              return 0
            fi
          else
            healthy_checks=0
          fi
          if [ "${status}" = "unhealthy" ]; then
            diagnose_backend
            return 1
          fi
          sleep 2
        done

        diagnose_backend
        return 1
      }

      deploy_containers() {
        docker compose up -d --build --no-deps --force-recreate backend
        wait_for_backend_health
        docker compose up -d --build --no-deps --force-recreate mcp
      }

      restart_container_runtime() {
        sudo -n systemctl stop docker.socket docker || true
        sudo -n systemctl stop containerd || true
        sudo -n systemctl start containerd
        sudo -n systemctl start docker
      }

      remove_recreate_containers() {
        if docker ps -aq \
          --filter name='^[0-9a-f]+_mcp-knowledge-hub-backend$' \
          --filter name='^[0-9a-f]+_mcp-knowledge-hub-mcp$' | grep -q .; then
          echo "Removing stale Compose recreate containers."
          docker ps -aq \
            --filter name='^[0-9a-f]+_mcp-knowledge-hub-backend$' \
            --filter name='^[0-9a-f]+_mcp-knowledge-hub-mcp$' | xargs -r docker rm -f
        fi
      }

      release_service_ports() {
        for port in 8000 8001; do
          if ss -H -ltn "sport = :${port}" | grep -q .; then
            echo "Port ${port} is busy before deploy; releasing stale listener."
            ss -H -ltnp "sport = :${port}" || true
            sudo -n fuser -k "${port}/tcp"
            sleep 2
          fi

          if ss -H -ltn "sport = :${port}" | grep -q .; then
            echo "Port ${port} is still busy after release attempt."
            ss -H -ltnp "sport = :${port}" || true
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' || true
            exit 1
          fi
        done
      }

      echo "Restarting container runtime to clear stale container state before deploy."
      restart_container_runtime
      remove_recreate_containers
      cleanup_containers
      release_service_ports

      if docker ps -aq \
        --filter name=mcp-knowledge-hub-backend \
        --filter name=mcp-knowledge-hub-mcp | grep -q .; then
        echo "Old containers are still stuck after container runtime restart."
        docker ps -a \
          --filter name=mcp-knowledge-hub-backend \
          --filter name=mcp-knowledge-hub-mcp
        exit 1
      fi

      if ! deploy_containers; then
        echo "Docker failed while recreating containers; restarting container runtime and retrying once."
        restart_container_runtime
        remove_recreate_containers
        cleanup_containers
        release_service_ports

        if docker ps -aq \
          --filter name=mcp-knowledge-hub-backend \
          --filter name=mcp-knowledge-hub-mcp | grep -q .; then
          echo "Old containers are still stuck after retry cleanup."
          docker ps -a \
            --filter name=mcp-knowledge-hub-backend \
            --filter name=mcp-knowledge-hub-mcp
          exit 1
        fi

        deploy_containers
      fi
    - docker compose ps
    - |
      if ! docker compose exec -T backend python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"; then
        echo "Final backend healthcheck failed."
        docker compose ps || true
        docker inspect mcp-knowledge-hub-backend \
          --format '{{json .State}}' || true
        docker inspect mcp-knowledge-hub-backend \
          --format '{{range .Config.Env}}{{println .}}{{end}}' | grep POSTGRES_DSN || true
        docker logs --tail=200 mcp-knowledge-hub-backend || true
        exit 1
      fi
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
