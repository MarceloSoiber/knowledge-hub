stages:
  - deploy

deploy:
  stage: deploy
  tags:
    - docker-deploy
  resource_group: production
  variables:
    COMPOSE_PROJECT_NAME: mcp-knowledge-hub
    DOCKER_LOCAL_LLM_BASE_URL: "http://192.168.15.114:1234"
    MCP_PUBLIC_URL: "http://192.168.15.125:8001"
  script:
    - docker compose config --quiet
    - |
      cleanup_containers() {
        docker compose down --remove-orphans || true
        docker rm -f mcp-knowledge-hub-backend mcp-knowledge-hub-mcp 2>/dev/null || true
      }

      cleanup_containers

      if docker ps -aq \
        --filter name=mcp-knowledge-hub-backend \
        --filter name=mcp-knowledge-hub-mcp | grep -q .; then
        echo "Old containers are still stuck; restarting Docker before deploy."
        sudo -n systemctl restart docker
        cleanup_containers
      fi
    - docker compose up -d --build --remove-orphans
    - docker compose ps
    - curl --fail --retry 30 --retry-delay 2 --retry-connrefused --retry-all-errors --max-time 5 http://127.0.0.1:8000/health
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
