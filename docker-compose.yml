services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-knowledge-hub-backend
    init: true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: "MCP Knowledge Hub"
      ENVIRONMENT: development
      FRONTEND_ORIGIN: "${FRONTEND_ORIGIN:-http://localhost:5173}"
      POSTGRES_DSN: "${POSTGRES_DSN:-postgresql+asyncpg://postgres:postgres@postgres:5432/knowledge_hub}"
      LLM_PROVIDER: "${LLM_PROVIDER:-local}"
      LOCAL_LLM_BASE_URL: "${DOCKER_LOCAL_LLM_BASE_URL:-http://host.docker.internal:1234}"
      LOCAL_LLM_MODEL: "${LOCAL_LLM_MODEL:-gemma-4-12b-it}"
      API_LLM_BASE_URL: "${API_LLM_BASE_URL:-https://api.openai.com/v1}"
      API_LLM_MODEL: "${API_LLM_MODEL:-gpt-4.1-mini}"
      API_KEY: "${API_KEY:-}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5}"
      VECTOR_DIM: "${VECTOR_DIM:-768}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-knowledge-hub-mcp
    init: true
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["mcp-server"]
    environment:
      APP_NAME: "MCP Knowledge Hub"
      ENVIRONMENT: development
      POSTGRES_DSN: "${POSTGRES_DSN:-postgresql+asyncpg://postgres:postgres@postgres:5432/knowledge_hub}"
      LLM_PROVIDER: "${LLM_PROVIDER:-local}"
      LOCAL_LLM_BASE_URL: "${DOCKER_LOCAL_LLM_BASE_URL:-http://host.docker.internal:1234}"
      LOCAL_LLM_MODEL: "${LOCAL_LLM_MODEL:-gemma-4-12b-it}"
      API_LLM_BASE_URL: "${API_LLM_BASE_URL:-https://api.openai.com/v1}"
      API_LLM_MODEL: "${API_LLM_MODEL:-gpt-4.1-mini}"
      API_KEY: "${API_KEY:-}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5}"
      VECTOR_DIM: "${VECTOR_DIM:-768}"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8001"
      MCP_PUBLIC_URL: "${MCP_PUBLIC_URL:-http://192.0.2.10:8001}"
      MCP_PATH: "${MCP_PATH:-/mcp}"
      MCP_WRITE_ENABLED: "${MCP_WRITE_ENABLED:-false}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${MCP_PORT:-8001}:8001"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: mcp-knowledge-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: knowledge_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowledge_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
